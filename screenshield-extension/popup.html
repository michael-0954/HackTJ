<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ScreenShield</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 420px; height: 580px; overflow: hidden; }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <iframe src="https://screenshield.vercel.app" allow="clipboard-read; clipboard-write"></iframe>
</body>
</html>
