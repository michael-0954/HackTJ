<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ScreenShield</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { 
      width: 420px; 
      height: 480px; 
      overflow: hidden;
      border-radius: 16px;
      background: transparent;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 16px;
    }
  </style>
</head>
<body>
  <iframe src="https://screenshield.vercel.app?ext=1" allow="clipboard-read; clipboard-write"></iframe>
</body>
</html>
